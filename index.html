<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Alma Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F2;
      --ink: #1C1917;
      --muted: #78716C;
      --border: #E5E0D8;
      --accent: #C4714A;
      --sans: 'DM Sans', sans-serif;
      --serif: 'DM Serif Display', serif;
    }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2.5rem; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 50;
    }
    .nav-logo { font-family: var(--serif); font-size: 1.3rem; color: var(--ink); }
    .nav-logo em { color: var(--accent); font-style: italic; }
    .cart-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 0.5rem 1.1rem; border: 1px solid var(--border);
      border-radius: 4px; background: transparent; cursor: pointer;
      font-size: 0.875rem; color: var(--ink); font-family: var(--sans);
      transition: border-color 0.2s;
    }
    .cart-btn:hover { border-color: var(--ink); }
    .cart-badge {
      background: var(--accent); color: #fff; border-radius: 50%;
      width: 20px; height: 20px; font-size: 0.7rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .body-wrap {
      display: flex; gap: 2rem; padding: 2rem 2.5rem;
      align-items: flex-start; max-width: 1100px; margin: 0 auto;
    }
    .products-section { flex: 1; }
    .products-title {
      font-family: var(--serif); font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 400; color: var(--ink); margin-bottom: 1.5rem; line-height: 1.15;
    }
    .products-title em { color: var(--accent); font-style: italic; }
    .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
    .product-card { background: #fff; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .product-img-wrap { overflow: hidden; }
    .product-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; transition: transform 0.35s ease; }
    .product-card:hover .product-img { transform: scale(1.03); }
    .product-body { padding: 1rem 1.1rem 1.25rem; }
    .product-name { font-size: 0.9rem; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
    .product-desc { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.6rem; }
    .product-price { font-size: 0.95rem; font-weight: 600; color: var(--ink); margin-bottom: 0.75rem; }
    .add-btn {
      width: 100%; padding: 0.6rem; border: none; border-radius: 2px;
      font-size: 0.8rem; font-weight: 500; cursor: pointer;
      font-family: var(--sans); transition: background 0.2s;
    }
    .add-btn-default { background: var(--ink); color: var(--bg); }
    .add-btn-default:hover { background: var(--accent); }
    .add-btn-added { background: #3a7a4a; color: #fff; }
    .cart-panel {
      width: 300px; flex-shrink: 0; background: #fff;
      border: 1px solid var(--border); border-radius: 3px;
      padding: 1.5rem; position: sticky; top: 80px;
    }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .cart-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; color: var(--ink); }
    .close-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; font-family: var(--sans); }
    .cart-empty { font-size: 0.8rem; color: var(--muted); text-align: center; padding: 2rem 0; }
    .cart-item { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 1rem; }
    .cart-item-img { width: 48px; height: 48px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.8rem; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
    .cart-item-price { font-size: 0.75rem; color: var(--muted); }
    .qty-controls { display: flex; align-items: center; gap: 4px; }
    .qty-btn {
      width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 2px;
      background: transparent; cursor: pointer; font-size: 0.9rem; color: var(--ink);
      display: flex; align-items: center; justify-content: center; font-family: var(--sans);
    }
    .qty-btn:hover { border-color: var(--ink); }
    .qty-num { font-size: 0.85rem; min-width: 16px; text-align: center; color: var(--ink); }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.9rem; font-family: var(--sans); padding-left: 4px; }
    .cart-footer { border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; }
    .cart-total { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    .total-label { font-size: 0.8rem; color: var(--muted); }
    .total-value { font-size: 0.95rem; font-weight: 600; color: var(--ink); }
    .checkout-btn {
      width: 100%; padding: 0.75rem; background: var(--accent); color: #fff;
      border: none; border-radius: 2px; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; font-family: var(--sans); transition: opacity 0.2s;
    }
    .checkout-btn:hover { opacity: 0.88; }
    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; }
      .body-wrap { flex-direction: column; padding: 1.5rem 1.25rem; }
      .cart-panel { width: 100%; position: static; }
      .products-grid { gap: 0.875rem; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // preco em centavos pra evitar erro de arredondamento depois
    const PRODUCTS = [
      { id: 1, name: "Poltrona Luma", description: "Design escandinavo — Amarelo Mostarda", price: 189000, image: "https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=600&q=80" },
      { id: 2, name: "Sofá Linen", description: "Estofado em linho natural — Areia", price: 346700, image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=600&q=80" },
      { id: 3, name: "Mesa de Centro", description: "Mármore e ferro artesanal", price: 213400, image: "https://images.unsplash.com/photo-1513161455079-7dc1de15ef3e?w=600&q=80" },
      { id: 4, name: "Tapete Berber", description: "Tecido artesanal — Natural", price: 97800, image: "https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=600&q=80" },
    ];

    function fmt(cents) {
      return (cents / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function ProductCard({ product, onAdd }) {
      const [added, setAdded] = useState(false);

      function handleAdd() {
        onAdd(product);
        setAdded(true);
        // tempo suficiente pra dar feedback sem travar o fluxo de adicionar varios itens
        setTimeout(() => setAdded(false), 1800);
      }

      return (
        <div className="product-card">
          <div className="product-img-wrap">
            <img className="product-img" src={product.image} alt={product.name} loading="lazy" />
          </div>
          <div className="product-body">
            <p className="product-name">{product.name}</p>
            <p className="product-desc">{product.description}</p>
            <p className="product-price">{fmt(product.price)}</p>
            <button
              className={`add-btn ${added ? "add-btn-added" : "add-btn-default"}`}
              onClick={handleAdd}
            >
              {added ? "Adicionado ✓" : "Adicionar ao carrinho"}
            </button>
          </div>
        </div>
      );
    }

    function CartItem({ item, onRemove, onQtyChange }) {
      return (
        <div className="cart-item">
          <img className="cart-item-img" src={item.image} alt={item.name} />
          <div className="cart-item-info">
            <p className="cart-item-name">{item.name}</p>
            <p className="cart-item-price">{fmt(item.price)}</p>
          </div>
          <div className="qty-controls">
            <button className="qty-btn" onClick={() => onQtyChange(item.id, -1)}>−</button>
            <span className="qty-num">{item.qty}</span>
            <button className="qty-btn" onClick={() => onQtyChange(item.id, 1)}>+</button>
          </div>
          <button className="remove-btn" onClick={() => onRemove(item.id)}>✕</button>
        </div>
      );
    }

    function AlmaCart() {
      const savedCart = localStorage.getItem("almaCart");
      const [cart, setCart] = useState(savedCart ? JSON.parse(savedCart) : []);
      const [cartOpen, setCartOpen] = useState(false);

      useEffect(() => {
        localStorage.setItem("almaCart", JSON.stringify(cart));
      }, [cart]);

      function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);

        if (existing) {
          setCart(cart.map(item =>
            item.id === product.id ? { ...item, qty: item.qty + 1 } : item
          ));
        } else {
          setCart([...cart, { ...product, qty: 1 }]);
        }

        setCartOpen(true);
      }

      function removeItem(id) {
        setCart(cart.filter(item => item.id !== id));
      }

      function changeQty(id, delta) {
        const updated = cart.map(item =>
          item.id === id ? { ...item, qty: item.qty + delta } : item
        );
        // tira do carrinho quando a quantidade zera
        setCart(updated.filter(item => item.qty > 0));
      }

      let total = 0;
      let totalItems = 0;
      for (const item of cart) {
        total += item.price * item.qty;
        totalItems += item.qty;
      }

      return (
        <div>
          <nav>
            <span className="nav-logo">Alma<em>Casa</em></span>
            <button className="cart-btn" onClick={() => setCartOpen(!cartOpen)}>
              🛒 Carrinho
              {totalItems > 0 && <span className="cart-badge">{totalItems}</span>}
            </button>
          </nav>

          <div className="body-wrap">
            <div className="products-section">
              <h1 className="products-title">Coleção <em>Completa</em></h1>
              <div className="products-grid">
                {PRODUCTS.map(product => (
                  <ProductCard key={product.id} product={product} onAdd={addToCart} />
                ))}
              </div>
            </div>

            {cartOpen && (
              <div className="cart-panel">
                <div className="cart-header">
                  <h2 className="cart-title">Seu carrinho</h2>
                  <button className="close-btn" onClick={() => setCartOpen(false)}>✕</button>
                </div>

                {cart.length === 0 && (
                  <p className="cart-empty">Nenhum item adicionado ainda.</p>
                )}

                {cart.length > 0 && (
                  <div>
                    {cart.map(item => (
                      <CartItem
                        key={item.id}
                        item={item}
                        onRemove={removeItem}
                        onQtyChange={changeQty}
                      />
                    ))}
                    <div className="cart-footer">
                      <div className="cart-total">
                        <span className="total-label">Total</span>
                        <span className="total-value">{fmt(total)}</span>
                      </div>
                      <button className="checkout-btn">Finalizar compra</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<AlmaCart />, document.getElementById("root"));
  </script>
</body>
</html>
